<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <link rel="manifest" href="manifest.json">

  <title>Pocky Dash</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- Librería Phaser -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>

  <link rel="apple-touch-icon" href="Icono.jpg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mi Juego">

  <!-- Estilos -->
  <style>
    body {
      margin: 0;
      padding: 0;
      background: black;
      overflow: hidden; /* evita scroll */
    }

    canvas {
      display: block;
      max-width:100%;
      height:auto;
    }
  </style>
</head>
<body>
  <!-- Scripts del proyecto -->
  <!-- Aqui tu boot estaba en minuscula cuando tienes tu archivo en mayuscula como Boot -->
<script src="boot.js"></script>
<script src="carga.js"></script>
<script src="inicio.js"></script>
<script src="juego.js"></script>
<script src="seleccioncolor.js"></script>
<script src="main.js"></script>
<script src="sw.js"></script>
<script src="manifest.json"></script>

<!-- Agregamos el service worker -->
<script> 
if ("serviceWorker" in navigator) {
  if ("serviceWorker" in navigator) {
     window.addEventListener("load", () => {
       navigator.serviceWorker.register("sw.js")
         .then((registration) => console.log("Service Worker registrado", registration))
         .catch((error) => console.log("Error al registrar el Service Worker:", error));
     });
    }
  }
</script>

  
</body>
</html>
